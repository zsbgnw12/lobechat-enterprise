name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  ACR_NAME: lobechatacroperation
  IMAGE_NAME: lobechat
  RESOURCE_GROUP: Operation
  APP_NAME: lobechat
  ACA_ENV: lobechat-env
  REGION: southeastasia
  TARGET_PORT: '3210'

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build on GitHub runner (16 GB RAM) — ACR default agent OOMs on
      # LobeChat next build (needs ~6 GB). Push finished image to ACR.
      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          build-args: |
            USE_CN_MIRROR=true
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

      - name: Deploy to Container Apps
        id: deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KEY_VAULTS_SECRET: ${{ secrets.KEY_VAULTS_SECRET }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          CASDOOR_ID: ${{ secrets.CASDOOR_ID }}
          CASDOOR_SECRET: ${{ secrets.CASDOOR_SECRET }}
          GONGDAN_SYNTHETIC_PASSWORD_PEPPER: ${{ secrets.GONGDAN_SYNTHETIC_PASSWORD_PEPPER }}
          GONGDAN_API_KEY: ${{ secrets.GONGDAN_API_KEY }}
          CASDOOR_ISSUER: https://casdoor.ashyglacier-8207efd2.eastasia.azurecontainerapps.io
          CHAT_GW_URL: https://gaw-chat-tools-d0dhb6h2hwbac2ev.southeastasia-01.azurewebsites.net
          GONGDAN_API_BASE: https://gongdan-b5fzbtgteqd5gzfb.eastasia-01.azurewebsites.net/api
          ENTERPRISE_ADMIN_EMAIL: zsbgnw@gmail.com
        run: |
          set -euo pipefail

          az acr update -n "$ACR_NAME" --admin-enabled true >/dev/null
          ACR_PW=$(az acr credential show -n "$ACR_NAME" --query 'passwords[0].value' -o tsv)

          IMAGE_REF="$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}"

          if az containerapp show -n "$APP_NAME" -g "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "Updating existing containerapp..."
            # Build secret list (only non-empty) + env list
            SECRET_ARGS=()
            ENV_ARGS=(
              "GONGDAN_API_BASE=$GONGDAN_API_BASE"
              "ENTERPRISE_ADMIN_EMAIL=$ENTERPRISE_ADMIN_EMAIL"
            )
            if [ -n "${GONGDAN_SYNTHETIC_PASSWORD_PEPPER:-}" ]; then
              SECRET_ARGS+=("gongdan-pepper=$GONGDAN_SYNTHETIC_PASSWORD_PEPPER")
              ENV_ARGS+=("GONGDAN_SYNTHETIC_PASSWORD_PEPPER=secretref:gongdan-pepper")
            fi
            if [ -n "${GONGDAN_API_KEY:-}" ]; then
              SECRET_ARGS+=("gongdan-api-key=$GONGDAN_API_KEY")
              ENV_ARGS+=("GONGDAN_API_KEY=secretref:gongdan-api-key")
            fi
            if [ "${#SECRET_ARGS[@]}" -gt 0 ]; then
              az containerapp secret set \
                -n "$APP_NAME" -g "$RESOURCE_GROUP" \
                --secrets "${SECRET_ARGS[@]}" >/dev/null
            fi
            az containerapp update \
              -n "$APP_NAME" -g "$RESOURCE_GROUP" \
              --image "$IMAGE_REF" \
              --set-env-vars "${ENV_ARGS[@]}"
          else
            echo "Creating new containerapp..."
            az containerapp create \
              -n "$APP_NAME" -g "$RESOURCE_GROUP" \
              --environment "$ACA_ENV" \
              --image "$IMAGE_REF" \
              --target-port "$TARGET_PORT" \
              --ingress external \
              --registry-server "$ACR_NAME.azurecr.io" \
              --registry-username "$ACR_NAME" \
              --registry-password "$ACR_PW" \
              --cpu 1.0 --memory 2.0Gi \
              --min-replicas 1 --max-replicas 3 \
              --secrets \
                "database-url=$DATABASE_URL" \
                "key-vaults-secret=$KEY_VAULTS_SECRET" \
                "auth-secret=$AUTH_SECRET" \
                "casdoor-id=$CASDOOR_ID" \
                "casdoor-secret=$CASDOOR_SECRET" \
                "gongdan-pepper=$GONGDAN_SYNTHETIC_PASSWORD_PEPPER" \
                "gongdan-api-key=$GONGDAN_API_KEY" \
              --env-vars \
                "DATABASE_URL=secretref:database-url" \
                "DATABASE_DRIVER=node" \
                "KEY_VAULTS_SECRET=secretref:key-vaults-secret" \
                "AUTH_SECRET=secretref:auth-secret" \
                "AUTH_SSO_PROVIDERS=casdoor" \
                "AUTH_CASDOOR_ID=secretref:casdoor-id" \
                "AUTH_CASDOOR_SECRET=secretref:casdoor-secret" \
                "AUTH_CASDOOR_ISSUER=$CASDOOR_ISSUER" \
                "CHAT_GW_URL=$CHAT_GW_URL" \
                "GONGDAN_API_BASE=$GONGDAN_API_BASE" \
                "GONGDAN_API_KEY=secretref:gongdan-api-key" \
                "GONGDAN_SYNTHETIC_PASSWORD_PEPPER=secretref:gongdan-pepper" \
                "ENTERPRISE_ADMIN_EMAIL=$ENTERPRISE_ADMIN_EMAIL" \
                "S3_ENDPOINT=http://s3-disabled.local" \
                "S3_ACCESS_KEY_ID=disabled" \
                "S3_SECRET_ACCESS_KEY=disabled" \
                "S3_BUCKET=disabled" \
                "FEATURE_FLAGS=-market,-check_updates,-welcome_suggest,-cloud_promotion,-changelog,-agent_onboarding,+commercial_hide_github,+commercial_hide_docs" \
                "NEXT_PUBLIC_BASE_PATH=" \
                "NODE_ENV=production"
          fi

          FQDN=$(az containerapp show -n "$APP_NAME" -g "$RESOURCE_GROUP" \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          APP_URL="https://$FQDN"
          echo "FQDN: $FQDN"
          echo "APP_URL: $APP_URL"
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

          az containerapp update \
            -n "$APP_NAME" -g "$RESOURCE_GROUP" \
            --set-env-vars "APP_URL=$APP_URL" >/dev/null

      - name: Output deployed URL
        run: |
          echo "::notice title=Deployed::${{ steps.deploy.outputs.app_url }}"
          echo "### Deployed to: ${{ steps.deploy.outputs.app_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Casdoor redirectUri to add: \`${{ steps.deploy.outputs.app_url }}/api/auth/callback/casdoor\`" >> $GITHUB_STEP_SUMMARY
