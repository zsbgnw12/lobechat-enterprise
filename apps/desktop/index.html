<!doctype html>
<html class="desktop">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: inherit;
        gap: 12px;
      }
      @keyframes loading-draw {
        0% {
          stroke-dashoffset: 1000;
        }
        100% {
          stroke-dashoffset: 0;
        }
      }
      @keyframes loading-fill {
        30% {
          fill-opacity: 0.05;
        }
        100% {
          fill-opacity: 1;
        }
      }
      #loading-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #1f1f1f;
      }
      #loading-brand svg path {
        fill: currentcolor;
        fill-opacity: 0;
        stroke: currentcolor;
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        stroke-width: 0.25em;
        animation:
          loading-draw 2s cubic-bezier(0.4, 0, 0.2, 1) infinite,
          loading-fill 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      html[data-theme='dark'] #loading-brand {
        color: #f0f0f0;
      }
    </style>
  </head>
  <body style="height: 100%">
    <script>
      (function () {
        var theme = 'system';
        try {
          theme = localStorage.getItem('theme') || 'system';
        } catch (_) {}
        var systemTheme =
          window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        var resolvedTheme = theme === 'system' ? systemTheme : theme;
        if (resolvedTheme === 'dark' || resolvedTheme === 'light') {
          document.documentElement.setAttribute('data-theme', resolvedTheme);
        }
        // Check URL query parameter for locale (set by Electron main process from stored settings)
        var urlParams = new URLSearchParams(window.location.search);
        var locale = urlParams.get('lng') || navigator.language || 'en-US';
        document.documentElement.lang = locale;
        var rtl = ['ar', 'arc', 'dv', 'fa', 'ha', 'he', 'khw', 'ks', 'ku', 'ps', 'ur', 'yi'];
        document.documentElement.dir =
          rtl.indexOf(locale.split('-')[0].toLowerCase()) >= 0 ? 'rtl' : 'ltr';
      })();
    </script>
    <div id="loading-screen">
      <div id="loading-brand" aria-label="Loading" role="status">
        <span style="font-size: 32px; font-weight: 700; letter-spacing: 2px; font-family: system-ui, -apple-system, sans-serif;">heihub</span>
      </div>
    </div>
    <div id="root" style="height: 100%"></div>
    <script>
      window.__SERVER_CONFIG__ = undefined;
    </script>
    <script type="module" src="../../src/spa/entry.desktop.tsx"></script>
  </body>
</html>
